<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario de Actividades</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>

/* (TODO TU CSS ORIGINAL SIN CAMBIOS IMPORTANTES) */

/* SOLO AGREGO ESTO AL FINAL PARA INPUT VIDRIO */

.formulario input,
.formulario select{
width:100%;
padding:8px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(4px);
color:white;
border:1px solid #D4AF37;
border-radius:6px;
margin-bottom:45px;
box-sizing:border-box;
}

.formulario input::placeholder{
color:#eee;
}

.formulario input:focus,
.formulario select:focus{
outline:none;
box-shadow:
0 0 8px #FFD700,
0 0 15px rgba(255,215,0,0.5);
}

</style>
</head>

<body>

<div class="destellos"></div>

<header class="encabezado">
<h1 class="titulo-cinzel">BIENVENIDOS</h1>
<h2 class="subtitulo">Inscripción a temas</h2>
</header>

<div class="contenedor">

<div class="formulario">

<h1>Formulario de selección</h1>

<p class="texto-explicacion">
Selecciona el tema de tu preferencia y verifica en el calendario las instrucciones
</p>

<form id="formulario">

<input type="text" id="nombre" placeholder="Nombre" required>
<input type="email" id="correo" placeholder="Correo" required>

<select id="curso"></select>

<!-- 🔒 CONTRASEÑA INTEGRADA (ÚNICA Y CORRECTA) -->
<input type="password" id="clave" placeholder="Contraseña de acceso" required>

<button type="submit">ENVIAR INSCRIPCIÓN</button>

</form>

</div>

<div class="divisor"></div>

<div id="calendar"></div>

</div>

<!-- TODO LO DEMÁS DE TU HTML SE MANTIENE IGUAL -->

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){
emailjs.init("JbLq6Pz4o5CfG8tfQ");
})();

let eventos = JSON.parse(localStorage.getItem("eventos")) || [
{
id:'web',
title:'Programación Web',
start:'2026-03-10',
description:'Traer laptop'
},
{
id:'diseno',
title:'Diseño de página',
start:'2026-03-12',
description:'Traer bocetos'
}
]

let inscripciones = JSON.parse(localStorage.getItem("inscripciones")) || {}

let calendar

document.addEventListener('DOMContentLoaded',function(){

calendar = new FullCalendar.Calendar(
document.getElementById('calendar'),
{
initialView:'dayGridMonth',
locale:'es',
buttonText:{today:'Hoy'},
events: eventos,

eventClick:function(info){

mostrarModal(
info.event.title,
info.event.extendedProps.description
)

}

})

calendar.render()

actualizarCursos()
restaurarInscripciones()

})

function actualizarCursos(){

let select=document.getElementById("curso")
select.innerHTML=""

eventos.forEach(e=>{
let option=document.createElement("option")
option.value=e.id
option.textContent=e.title
select.appendChild(option)
})

}

function restaurarInscripciones(){

Object.keys(inscripciones).forEach(curso=>{

let evento=calendar.getEventById(curso)

if(evento){

evento.setProp("title",evento.title+" | Inscrito: "+inscripciones[curso])
evento.setProp("backgroundColor","#B22222")

}

})

}

/* INSCRIPCIÓN */

document.getElementById("formulario")
.addEventListener("submit",function(e){

e.preventDefault()

let clave = document.getElementById("clave").value

if(clave !== "1234"){
mostrarModal("Error","Contraseña incorrecta")
return
}

let nombre = document.getElementById("nombre").value
let correo = document.getElementById("correo").value
let curso = document.getElementById("curso").value
let nombreCurso = document.getElementById("curso").selectedOptions[0].text

if(inscripciones[curso]){
mostrarModal("Curso lleno","Este curso ya tiene inscrito")
return
}

inscripciones[curso]=nombre

localStorage.setItem("inscripciones",JSON.stringify(inscripciones))

let evento=calendar.getEventById(curso)

evento.setProp("title",evento.title+" | Inscrito: "+nombre)
evento.setProp("backgroundColor","#B22222")

emailjs.send("service_u8bx9dj","template_0yx01mn",{
nombre: nombre,
correo: correo,
curso: nombreCurso
})

emailjs.send("service_u8bx9dj","template_jssulea",{
nombre: nombre,
correo: correo,
curso: nombreCurso
})

});

/* MODAL */

function mostrarModal(titulo,texto){
modalActividad.style.display="flex"
tituloActividad.innerText=titulo
descripcionActividad.innerText=texto
}

function cerrarModal(){
modalActividad.style.display="none"
}

</script>

</body>
</html>
