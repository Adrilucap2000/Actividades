<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario de Actividades</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(
to bottom,
rgba(90,10,20,0.95),
rgba(90,10,20,0.85)
),
url("https://i.imgur.com/hTT1t8L.jpeg");
background-size:cover;
min-height:100vh;
padding:20px;
}

.encabezado{
text-align:center;
margin-bottom:40px;
}

.titulo-cinzel{
font-family:'Cinzel Decorative';
font-size:60px;
color:#F5E6A3;
}

.subtitulo{
font-family:'Cinzel Decorative';
color:white;
font-size:22px;
}

.contenedor{
display:grid;
grid-template-columns:1fr 2px 2fr;
gap:30px;
max-width:1200px;
margin:auto;
}

.divisor{
width:2px;
background:white;
border-radius:5px;
}

.formulario{
background:rgba(0,0,0,0.4);
padding:30px;
border-radius:15px;
color:white;
width:380px;
}

.formulario input,
.formulario select{
width:100%;
padding:8px;
border-radius:6px;
border:none;
margin-bottom:20px;
}

.formulario button{
background:#F2C94C;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

#calendar{
background:white;
padding:20px;
border-radius:18px;
min-height:600px;
}

.fc-event{
background:#D4AF37;
border:none;
color:black;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
z-index:1000;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-contenido{
background:white;
padding:25px;
border-radius:20px;
width:400px;
text-align:center;
}

.tlacuache-admin{
position:fixed;
bottom:70px;
right:15px;
width:70px;
z-index:9999;
}

</style>
</head>

<body>

<header class="encabezado">
<h1 class="titulo-cinzel">BIENVENIDOS</h1>
<h2 class="subtitulo">Inscripción a temas</h2>
</header>

<div class="contenedor">

<div class="formulario">

<h1>Formulario de selección</h1>

<form id="formulario">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="email" id="correo" placeholder="Correo" required>

<select id="curso"></select>

<button type="submit">
ENVIAR INSCRIPCIÓN
</button>

</form>

</div>

<div class="divisor"></div>

<div id="calendar"></div>

</div>

<img src="./tlaquache-admin.png" class="tlacuache-admin">

<button onclick="abrirLogin()" style="
position:fixed;
bottom:20px;
right:20px;
background:#7A1E2C;
color:white;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
">
ADMIN
</button>

<div id="adminLogin" class="modal">

<div class="modal-contenido">

<h2>Administrador</h2>

<input type="password" id="adminPass" placeholder="Contraseña">

<br><br>

<button onclick="verificarAdmin()">Entrar</button>

</div>

</div>

<div id="adminPanel" class="modal">

<div class="modal-contenido">

<h2>Crear actividad</h2>

<input id="nuevoTitulo" placeholder="Título">

<input id="nuevaDescripcion" placeholder="Descripción">

<input id="nuevaFecha" type="date">

<br><br>

<button onclick="crearActividad()">Guardar</button>

<br><br>

<button onclick="cerrarAdmin()">Cerrar</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore, 
collection, 
addDoc, 
getDocs, 
deleteDoc, 
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBnqZEuuv0V_CAmR_gBqPCQ3bgyS1ny_RI",
authDomain: "calendario-mpss.firebaseapp.com",
projectId: "calendario-mpss",
storageBucket: "calendario-mpss.firebasestorage.app",
messagingSenderId: "809122907226",
appId: "1:809122907226:web:c66cfc12aa8617de1fc463"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let eventos = []
let calendar

async function cargarEventos(){

const snapshot = await getDocs(collection(db,"eventos"))

eventos=[]

snapshot.forEach(docSnap=>{

eventos.push({

id:docSnap.id,
...docSnap.data()

})

})

calendar.removeAllEvents()

calendar.addEventSource(eventos)

actualizarCursos()

}

function actualizarCursos(){

let select=document.getElementById("curso")

select.innerHTML=""

eventos.forEach(e=>{

let option=document.createElement("option")

option.value=e.id
option.textContent=e.title

select.appendChild(option)

})

}

document.addEventListener('DOMContentLoaded',function(){

calendar = new FullCalendar.Calendar(

document.getElementById('calendar'),

{
initialView:'dayGridMonth',
locale:'es',
events:eventos
}

)

calendar.render()

cargarEventos()

})

async function crearActividad(){

let titulo=document.getElementById("nuevoTitulo").value
let descripcion=document.getElementById("nuevaDescripcion").value
let fecha=document.getElementById("nuevaFecha").value

await addDoc(collection(db,"eventos"),{

title:titulo,
start:fecha,
description:descripcion

})

cargarEventos()

}

window.crearActividad=crearActividad

</script>

<script>

function abrirLogin(){

adminLogin.style.display="flex"

}

function cerrarAdmin(){

adminPanel.style.display="none"

}

function verificarAdmin(){

if(adminPass.value==="MPSS2026"){

adminLogin.style.display="none"

adminPanel.style.display="flex"

}

}

</script>

</body>
</html>
