<style>
/* ================= TODO TU CSS ORIGINAL ================= */

.tabs-admin{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.tab-admin{
background: linear-gradient(145deg,#7A1E2C,#5a0a14);
color:#F5E6A3;
padding:8px 18px;
border:none;
border-radius:10px 10px 0 0;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 5px #F2C94C;
transition:0.3s;
}

.tab-admin:hover{
background: linear-gradient(145deg,#8f2436,#6b0c1a);
box-shadow:0 0 10px #FFD700,0 0 20px rgba(255,215,0,0.6);
}

#adminPanel button:not(.tab-admin){
background: linear-gradient(145deg,#7A1E2C,#5a0a14);
color:#F5E6A3;
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
letter-spacing:1px;
margin:5px;
transition:0.3s;
box-shadow:0 0 5px #F2C94C,0 0 10px rgba(0,0,0,0.4);
}

#adminPanel button:hover{
background: linear-gradient(145deg,#8f2436,#6b0c1a);
transform:scale(1.05);
box-shadow:0 0 10px #FFD700,0 0 20px #FFD700,0 0 35px rgba(255,215,0,0.7);
}

.boton-mini{
padding:2px 6px;
font-size:12px;
background: linear-gradient(145deg,#7A1E2C,#5a0a14);
color:#F5E6A3;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.2s;
box-shadow:0 0 3px #F2C94C,0 0 6px rgba(0,0,0,0.4);
}

.boton-mini:hover{
background: linear-gradient(145deg,#8f2436,#6b0c1a);
transform:scale(1.05);
box-shadow:0 0 6px #FFD700,0 0 12px rgba(255,215,0,0.6);
}

#adminPanel input{
background:#FFF5CC;
border:1px solid #D4AF37;
padding:6px;
border-radius:6px;
}

#adminPanel input:focus{
outline:none;
box-shadow:0 0 6px #FFD700,0 0 12px rgba(255,215,0,0.5);
}

body{
font-family:Arial;
background:
linear-gradient(
to bottom,
rgba(90,10,20,0.95) 0%,
rgba(90,10,20,0.85) 50%,
rgba(90,10,20,0.75) 100%
),
url("https://i.imgur.com/hTT1t8L.jpeg");
background-size:cover;
background-position:center;
background-attachment:scroll;
background-repeat: no-repeat;
min-height: 100vh;
padding:20px;
overflow-x:hidden;
}

.destellos{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
background-image:
radial-gradient(#FFD700 2px, transparent 2px),
radial-gradient(#F2C94C 1px, transparent 1px),
radial-gradient(#FFF5CC 1px, transparent 1px);
background-size:120px 120px,80px 80px,60px 60px;
animation:brillos 20s linear infinite;
opacity:0.6;
}

@keyframes brillos{
from{transform:translateY(0)}
to{transform:translateY(-200px)}
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:radial-gradient(#F2C94C 1px, transparent 1px);
background-size:50px 50px;
opacity:0.15;
animation:estrellas 40s linear infinite;
pointer-events:none;
}

@keyframes estrellas{
from{transform:translateY(0)}
to{transform:translateY(-200px)}
}
