<script>

(function(){
emailjs.init("JbLq6Pz4o5CfG8tfQ");
})();

let calendar
let esAdmin = false
let modoEscritura = false
let inputActivo = null
let idAEliminar = null
let ultimoSnapshotAnotaciones = null
// ✅ FUNCIÓN ARRIBA (CRÍTICO)
function actualizarCursos(){

let select = document.getElementById("curso")
if(!select) return

select.innerHTML = ""

db.collection("eventos").get().then(snapshot => {

snapshot.forEach(async doc => {

let e = doc.data()

let insc = await db.collection("inscripciones").doc(doc.id).get()

let option = document.createElement("option")
option.value = doc.id

if(insc.exists){
option.textContent = e.title + " (LLENO)"
option.disabled = true
} else {
option.textContent = e.title
}

select.appendChild(option)

})

})

}

// ✅ TODO DENTRO DEL DOM
document.addEventListener('DOMContentLoaded',function(){

// 🔄 actualizar select
actualizarCursos()

// 🔐 LOGIN PROMETEO (YA FUNCIONA)
const PASSWORD = "TLAQH2026"
const input = document.getElementById("pinInput")
const pantalla = document.getElementById("pantallaInicio")

if(input && pantalla){
input.addEventListener("keyup", function(){

if(input.value.trim() === PASSWORD){
pantalla.style.display = "none"
}

})

}
// 📅 CALENDARIO
calendar = new FullCalendar.Calendar(
document.getElementById('calendar'),
{
initialView:'dayGridMonth',
locale:'es',
buttonText:{today:'Hoy'},
events: [],

// 👉 CLICK EN DÍA (ESCRIBIR)
dateClick: function(info){

if(inputActivo){
inputActivo.remove()
inputActivo = null
}

if(!esAdmin || !modoEscritura) return

let contenedor = info.dayEl.querySelector(".fc-daygrid-day-events")

let input = document.createElement("input")
input.type = "text"
input.placeholder = "Escribir..."
input.style.width = "100%"
input.style.fontSize = "12px"

inputActivo = input

contenedor.appendChild(input)
input.focus()

input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let texto = input.value.trim()

if(texto){
db.collection("anotaciones").add({
fecha: info.dateStr,
texto: texto
})
}

input.remove()
inputActivo = null

}

})

},

// 👉 CLICK EN EVENTO (EDITAR)
eventClick:function(info){

if(info.event.extendedProps.tipo === "anotacion"){

if(!modoEscritura) return
if(inputActivo) return

let el = info.el

let input = document.createElement("input")
input.type = "text"
input.value = info.event.title.replace("📝 ","")
input.style.width = "100%"
input.style.fontSize = "12px"

inputActivo = input

el.style.display = "none"
el.parentNode.appendChild(input)
input.focus()

// guardar
input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

let nuevo = input.value.trim()

if(nuevo){
db.collection("anotaciones")
.doc(info.event.id)
.update({ texto: nuevo })
}

input.remove()
el.style.display = ""
inputActivo = null

}

})

// cancelar
input.addEventListener("blur", function(){
input.remove()
el.style.display = ""
inputActivo = null
})

return
}

// evento normal
mostrarModal(
info.event.title,
info.event.extendedProps?.description || ""
)

},

// 👉 CLICK DERECHO = ELIMINAR
eventDidMount: function(info){

if(info.event.extendedProps.tipo === "anotacion"){

info.el.addEventListener("contextmenu", function(e){
e.preventDefault()

if(!modoEscritura) return

abrirModalEliminar(info.event.id)

})

}

}
})
calendar.render()

let eventosData = {}
let inscripcionesData = {}

function renderCalendar(){

// 🔥 BORRAR SOLO EVENTOS NORMALES (NO anotaciones)
calendar.getEvents().forEach(e => {
if(!e.extendedProps.tipo){
e.remove()
}
})

for(let id in eventosData){

let e = eventosData[id]
let inscrito = inscripcionesData[id]

let eventoFinal = {
id: id,
title: e.title,
start: e.start,
description: e.description
}

function crearActividad(){

let titulo=document.getElementById("nuevoTitulo").value
let descripcion=document.getElementById("nuevaDescripcion").value
let fecha=document.getElementById("nuevaFecha").value

if(!titulo || !fecha){
alert("Completa título y fecha")
return
}

let nuevaActividad={
id:"act"+Date.now(),
title:titulo,
start:fecha,
description:descripcion
}

db.collection("eventos").doc(nuevaActividad.id).set({
title: titulo,
start: fecha,
description: descripcion
})
actualizarCursos()

document.getElementById("curso").value = nuevaActividad.id

mostrarActividades()

document.getElementById("nuevoTitulo").value=""
document.getElementById("nuevaDescripcion").value=""
document.getElementById("nuevaFecha").value=""

}

document.getElementById("editTitulo").value = evento.title
document.getElementById("editDescripcion").value = evento.description
document.getElementById("editFecha").value = evento.start

document.getElementById("modalEditar").style.display="flex"

})

}

function guardarEdicion(){

let titulo = document.getElementById("editTitulo").value
let descripcion = document.getElementById("editDescripcion").value
let fecha = document.getElementById("editFecha").value

db.collection("eventos").doc(editID).update({
title: titulo,
description: descripcion,
start: fecha
}).then(() => {
cerrarEditar()
})

}

function cerrarEditar(){
document.getElementById("modalEditar").style.display="none"
}


function eliminarActividad(id){

db.collection("eventos").doc(id).delete()

actualizarCursos()

}
