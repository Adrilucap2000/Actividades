<script>

(function(){
emailjs.init("JbLq6Pz4o5CfG8tfQ");
})();

let calendar

// ✅ FUNCIÓN ARRIBA (CRÍTICO)
function actualizarCursos(){

let select = document.getElementById("curso")
if(!select) return

select.innerHTML = ""

db.collection("eventos").get().then(snapshot => {

snapshot.forEach(async doc => {

let e = doc.data()

let insc = await db.collection("inscripciones").doc(doc.id).get()

let option = document.createElement("option")
option.value = doc.id

if(insc.exists){
option.textContent = e.title + " (LLENO)"
option.disabled = true
} else {
option.textContent = e.title
}

select.appendChild(option)

})

})

}

// ✅ TODO DENTRO DEL DOM
document.addEventListener('DOMContentLoaded',function(){

// 🔄 actualizar select
actualizarCursos()

// 🔐 LOGIN PROMETEO (FIREBASE)
const input = document.getElementById("pinInput")
const pantalla = document.getElementById("pantallaInicio")

if(input && pantalla){

input.addEventListener("keyup", function(){

if(input.value.length >= 6){

auth.signInWithEmailAndPassword("admin@prometeo.com", input.value)
.then(() => {
pantalla.style.display = "none"
})
.catch(() => {})

}

})

auth.onAuthStateChanged(user => {
if(user){
pantalla.style.display = "none"
}
})

}

}) // 🔥 ESTE TE FALTABA

// 🔓 FUERA DEL DOM
function cerrarSesion(){
auth.signOut()
location.reload()
}
// 📅 CALENDARIO
calendar = new FullCalendar.Calendar(
document.getElementById('calendar'),
{
initialView:'dayGridMonth',
locale:'es',
buttonText:{today:'Hoy'},
events: [],
eventClick:function(info){
mostrarModal(
info.event.title,
info.event.extendedProps.description
)
}
})

calendar.render()

let eventosData = {}
let inscripcionesData = {}

function renderCalendar(){

calendar.removeAllEvents()

for(let id in eventosData){

let e = eventosData[id]
let inscrito = inscripcionesData[id]

let eventoFinal = {
id: id,
title: e.title,
start: e.start,
description: e.description
}

// 🔥 SI EXISTE INSCRIPCIÓN
if(inscrito && inscrito.nombre){
eventoFinal.title = e.title + " | " + inscrito.nombre
eventoFinal.backgroundColor = "#B22222"
eventoFinal.borderColor = "#B22222"
}

calendar.addEvent(eventoFinal)

}

}

// 🔥 eventos en tiempo real
db.collection("eventos").onSnapshot(snapshot => {

eventosData = {}

snapshot.forEach(doc=>{
eventosData[doc.id] = doc.data()
})

renderCalendar()

})

// 🔥 inscripciones en tiempo real
db.collection("inscripciones").onSnapshot(snapshot => {

inscripcionesData = {}

snapshot.forEach(doc=>{
inscripcionesData[doc.id] = doc.data()
})

renderCalendar()

})

// 🟢 INSCRIPCIÓN
document.getElementById("formulario")
.addEventListener("submit",function(e){

e.preventDefault()

let nombre = document.getElementById("nombre").value
let correo = document.getElementById("correo").value
let curso = document.getElementById("curso").value
let nombreCurso = document.getElementById("curso").selectedOptions[0].text

db.collection("inscripciones").doc(curso).set({
nombre: nombre,
correo: correo
})
.then(() => {

console.log("✅ INSCRIPCIÓN GUARDADA:", curso)

// 🔄 actualizar select
actualizarCursos()

// 🔄 actualizar evento en calendario
let evento = calendar.getEventById(curso)

if(evento){
evento.setProp("title", evento.title + " | Inscrito: " + nombre)
evento.setProp("backgroundColor", "#B22222")
}

// 📧 correos
emailjs.send("service_u8bx9dj","template_0yx01mn",{
nombre: nombre,
correo: correo,
curso: nombreCurso
})

emailjs.send("service_u8bx9dj","template_jssulea",{
nombre: nombre,
correo: correo,
curso: nombreCurso
})

})

})

})

/* PARTICIPANTES */

function mostrarInscritos(){

document.getElementById("seccionActividades").style.display="none"
document.getElementById("seccionInscritos").style.display="block"
document.getElementById("seccionCrear").style.display="none"

let lista = document.getElementById("seccionInscritos")

db.collection("inscripciones").onSnapshot(async snapshot => {

lista.innerHTML=""

for (const doc of snapshot.docs){

let data = doc.data()

// 🔥 TRAER EL NOMBRE DEL EVENTO
let eventoDoc = await db.collection("eventos").doc(doc.id).get()

let tituloEvento = "Sin nombre"

if(eventoDoc.exists){
tituloEvento = eventoDoc.data().title
}

lista.innerHTML += `
<div>
<b>${tituloEvento}</b> → ${data.nombre}
<button onclick="eliminarInscripcion('${doc.id}')">Eliminar</button>
</div>
`

}

})

}
function eliminarInscripcion(id){

db.collection("inscripciones").doc(id).delete()

actualizarCursos()

}
function mostrarCrear(){

document.getElementById("seccionActividades").style.display="none"
document.getElementById("seccionInscritos").style.display="none"
document.getElementById("seccionCrear").style.display="block"

}

/* ACTIVIDADES */

function mostrarActividades(){

document.getElementById("seccionActividades").style.display="block"
document.getElementById("seccionInscritos").style.display="none"
document.getElementById("seccionCrear").style.display="none"

let lista = document.getElementById("listaActividades")

db.collection("eventos").onSnapshot(snapshot => {

lista.innerHTML=""

snapshot.forEach(doc => {

let e = doc.data()

lista.innerHTML += `
<div style="margin:10px;padding:10px;border-bottom:1px solid #ccc">

<b>${e.title}</b>

<button class="boton-mini" onclick="editarActividad('${doc.id}')">
Editar
</button>

<button onclick="eliminarActividad('${doc.id}')">

Eliminar
</button>

</div>
`

})

})

}
function crearActividad(){

let titulo=document.getElementById("nuevoTitulo").value
let descripcion=document.getElementById("nuevaDescripcion").value
let fecha=document.getElementById("nuevaFecha").value

if(!titulo || !fecha){
alert("Completa título y fecha")
return
}

let nuevaActividad={
id:"act"+Date.now(),
title:titulo,
start:fecha,
description:descripcion
}

db.collection("eventos").doc(nuevaActividad.id).set({
title: titulo,
start: fecha,
description: descripcion
})
actualizarCursos()

document.getElementById("curso").value = nuevaActividad.id

mostrarActividades()

document.getElementById("nuevoTitulo").value=""
document.getElementById("nuevaDescripcion").value=""
document.getElementById("nuevaFecha").value=""

}


let editID=null

function editarActividad(id){

editID = id

db.collection("eventos").doc(id).get().then(doc => {

let evento = doc.data()

document.getElementById("editTitulo").value = evento.title
document.getElementById("editDescripcion").value = evento.description
document.getElementById("editFecha").value = evento.start

document.getElementById("modalEditar").style.display="flex"

})

}

function guardarEdicion(){

let titulo = document.getElementById("editTitulo").value
let descripcion = document.getElementById("editDescripcion").value
let fecha = document.getElementById("editFecha").value

db.collection("eventos").doc(editID).update({
title: titulo,
description: descripcion,
start: fecha
}).then(() => {
cerrarEditar()
})

}

function cerrarEditar(){
document.getElementById("modalEditar").style.display="none"
}


function eliminarActividad(id){

db.collection("eventos").doc(id).delete()

mostrarActividades()
actualizarCursos()

}
  
</script>
