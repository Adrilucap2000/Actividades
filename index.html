<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario de Actividades</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <style>
        /* CSS GENERAL */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, rgba(90,10,20,0.95), rgba(90,10,20,0.85)), url("https://i.imgur.com/hTT1t8L.jpeg");
            background-size: cover;
            background-attachment: fixed;
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* TÍTULOS */
        .encabezado { text-align: center; margin-bottom: 40px; }
        .titulo-cinzel { font-family: 'Cinzel Decorative'; font-size: 50px; color: #F5E6A3; margin: 0; }
        .subtitulo { font-family: 'Cinzel Decorative'; font-size: 20px; color: #white; }

        /* CONTENEDOR PRINCIPAL */
        .contenedor {
            display: grid;
            grid-template-columns: 380px 2px 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: auto;
        }

        .divisor { width: 2px; background: rgba(255,255,255,0.3); }

        /* FORMULARIO Y BLOQUEO */
        .formulario-wrapper { position: relative; width: 380px; }
        .formulario {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(242, 201, 76, 0.3);
        }
        .overlay-formulario {
            position: absolute; inset: 0; z-index: 10;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border-radius: 15px; padding: 20px;
        }

        input, select {
            width: 100%; padding: 10px; margin-bottom: 15px;
            border-radius: 5px; border: none; box-sizing: border-box;
        }

        button {
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }

        /* CALENDARIO */
        #calendar { background: white; padding: 15px; border-radius: 15px; color: black; }

        /* MODALES */
        .modal {
            display: none; position: fixed; z-index: 1000; inset: 0;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
        }
        .modal-contenido {
            background: white; color: black; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 400px; position: relative; text-align: center;
        }

        /* EL TLACUACHE (CORREGIDO) */
        .tlacuache-admin {
            position: fixed; bottom: 70px; right: 15px;
            width: 80px !important; height: auto;
            z-index: 9998; pointer-events: none;
            animation: balanceo 2.5s infinite ease-in-out;
        }

        @keyframes balanceo {
            0%, 100% { transform: rotate(-6deg); }
            50% { transform: rotate(6deg); }
        }

        .btn-admin-flotante {
            position: fixed; bottom: 20px; right: 20px;
            background: #7A1E2C; color: #F5E6A3; border: 1px solid #F2C94C;
            padding: 12px 20px; border-radius: 10px; z-index: 9999;
        }
    </style>
</head>
<body>

<header class="encabezado">
    <h1 class="titulo-cinzel">BIENVENIDOS</h1>
    <h2 class="subtitulo">Inscripción a temas</h2>
</header>

<div class="contenedor">
    <div class="formulario-wrapper">
        <div id="overlay-formulario" class="overlay-formulario">
            <h3>Acceso Restringido</h3>
            <p>Introduce el código del instructor:</p>
            <input type="password" id="codigoAcceso" placeholder="Código">
            <button onclick="verificarAccesoFormulario()" style="background:#F2C94C; padding:10px 20px; border:none; border-radius:5px;">DESBLOQUEAR</button>
            <p id="errorAcceso" style="display:none; color:red; margin-top:10px;">Código incorrecto</p>
        </div>

        <div class="formulario">
            <h3>Registro</h3>
            <form id="formInscripcion">
                <input type="text" id="nombre" placeholder="Tu Nombre" required>
                <input type="email" id="correo" placeholder="Tu Correo" required>
                <label>Selecciona Tema:</label>
                <select id="cursoSelect"></select>
                <button type="submit" style="background:#7A1E2C; color:white; width:100%; padding:12px; border:none; border-radius:5px;">ENVIAR INSCRIPCIÓN</button>
            </form>
        </div>
    </div>

    <div class="divisor"></div>

    <div id="calendar"></div>
</div>

<div id="modalActividad" class="modal">
    <div class="modal-contenido">
        <h2 id="tituloActividad"></h2>
        <p id="descActividad"></p>
        <button onclick="cerrarModales()" style="background:#7A1E2C; color:white; padding:10px; border:none; border-radius:5px;">Cerrar</button>
    </div>
</div>

<div id="adminLogin" class="modal">
    <div class="modal-contenido">
        <h2>Panel Admin</h2>
        <input type="password" id="adminPass" placeholder="Contraseña">
        <button onclick="verificarAdmin()" style="background:#7A1E2C; color:white; padding:10px; width:100%; border:none;">Entrar</button>
        <button onclick="cerrarModales()" style="margin-top:10px; background:none; border:none;">Cancelar</button>
    </div>
</div>

<div id="adminPanel" class="modal">
    <div class="modal-contenido" style="max-width: 600px;">
        <h2>Gestión de Actividades</h2>
        <div id="listaActividades" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; text-align: left;"></div>
        <hr>
        <h3>Nueva Actividad</h3>
        <input id="newTitle" placeholder="Título">
        <input id="newDesc" placeholder="Descripción">
        <input id="newDate" type="date">
        <button onclick="crearActividad()" style="background:green; color:white; padding:10px; width:100%; border:none;">Guardar</button>
        <br><br>
        <button onclick="cerrarModales()" style="background:#333; color:white; padding:10px; width:100%; border:none;">Salir</button>
    </div>
</div>

<img src="https://raw.githubusercontent.com/TU_USUARIO/TU_REPOSITORIO/main/tlaquache-admin.png" class="tlacuache-admin">
<button class="btn-admin-flotante" onclick="abrirLogin()">ADMIN</button>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBnqZEuuv0V_CAmR_gBqPCQ3bgyS1ny_RI",
        authDomain: "calendario-mpss.firebaseapp.com",
        projectId: "calendario-mpss",
        storageBucket: "calendario-mpss.firebasestorage.app",
        messagingSenderId: "809122907226",
        appId: "1:809122907226:web:c66cfc12aa8617de1fc463"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Compartir con el script normal
    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.getDocs = getDocs;
    window.deleteDoc = deleteDoc;
    window.doc = doc;

    window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
    let calendar;
    let eventos = [];
    const HASH_CORRECTO = "5d2d86f0f75a5c8c4a0cfe5fa5e1e0b1c0b4f7e5d70bdb8c4b4e33e3c0df0b91";

    window.addEventListener('firebase-ready', () => {
        initApp();
    });

    function initApp() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'es',
            events: (info, success) => {
                fetchEventos().then(data => success(data));
            },
            eventClick: (info) => {
                document.getElementById('modalActividad').style.display = 'flex';
                document.getElementById('tituloActividad').innerText = info.event.title;
                document.getElementById('descActividad').innerText = info.event.extendedProps.description || 'Sin descripción';
            }
        });
        calendar.render();
        
        if(sessionStorage.getItem('unlocked') === 'true') {
            document.getElementById('overlay-formulario').style.display = 'none';
        }
    }

    async function fetchEventos() {
        const querySnapshot = await getDocs(collection(db, "eventos"));
        eventos = [];
        const select = document.getElementById('cursoSelect');
        select.innerHTML = '';
        
        querySnapshot.forEach((doc) => {
            const data = { id: doc.id, ...doc.data() };
            eventos.push(data);
            const opt = document.createElement('option');
            opt.value = data.id;
            opt.textContent = data.title;
            select.appendChild(opt);
        });
        return eventos;
    }

    // --- ACCESO Y SEGURIDAD ---
    async function verificarAccesoFormulario() {
        const pass = document.getElementById('codigoAcceso').value;
        const msg = document.getElementById('errorAcceso');
        
        const encoder = new TextEncoder();
        const data = encoder.encode(pass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if(hashHex === HASH_CORRECTO) {
            sessionStorage.setItem('unlocked', 'true');
            document.getElementById('overlay-formulario').style.display = 'none';
        } else {
            msg.style.display = 'block';
        }
    }

    // --- ADMIN ---
    function abrirLogin() { document.getElementById('adminLogin').style.display = 'flex'; }
    function cerrarModales() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
    }

    function verificarAdmin() {
        if(document.getElementById('adminPass').value === "MPSS2026") {
            cerrarModales();
            document.getElementById('adminPanel').style.display = 'flex';
            actualizarListaAdmin();
        } else {
            alert("Contraseña incorrecta");
        }
    }

    async function actualizarListaAdmin() {
        const lista = document.getElementById('listaActividades');
        lista.innerHTML = 'Cargando...';
        await fetchEventos();
        lista.innerHTML = '';
        eventos.forEach(e => {
            lista.innerHTML += `
                <div style="padding:10px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; color:black;">
                    <span>${e.title}</span>
                    <button onclick="borrarEvento('${e.id}')" style="background:red; color:white; border:none; padding:5px;">Eliminar</button>
                </div>`;
        });
    }

    async function crearActividad() {
        const title = document.getElementById('newTitle').value;
        const description = document.getElementById('newDesc').value;
        const start = document.getElementById('newDate').value;
        
        if(!title || !start) return alert("Falta título o fecha");
        
        await addDoc(collection(db, "eventos"), { title, description, start });
        calendar.refetchEvents();
        actualizarListaAdmin();
    }

    async function borrarEvento(id) {
        if(confirm("¿Seguro?")) {
            await deleteDoc(doc(db, "eventos", id));
            calendar.refetchEvents();
            actualizarListaAdmin();
        }
    }

    // Exponer funciones al HTML
    window.verificarAccesoFormulario = verificarAccesoFormulario;
    window.abrirLogin = abrirLogin;
    window.cerrarModales = cerrarModales;
    window.verificarAdmin = verificarAdmin;
    window.crearActividad = crearActividad;
    window.borrarEvento = borrarEvento;
</script>

</body>
</html>
