<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario de Actividades MPSS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <style>
        /* --- ESTILOS VISUALES --- */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, rgba(90,10,20,0.95), rgba(90,10,20,0.85)),
            url("https://i.imgur.com/hTT1t8L.jpeg");
            background-size: cover;
            background-attachment: fixed;
            margin: 0; padding: 20px; color: white;
            min-height: 100vh;
        }

        .encabezado { text-align: center; margin-bottom: 40px; }
        .titulo-cinzel { font-family: 'Cinzel Decorative'; font-size: 60px; color: #F5E6A3; margin: 0; }
        .subtitulo { font-family: 'Cinzel Decorative'; font-size: 20px; color: white; margin-top: 10px; }

        .contenedor {
            display: grid;
            grid-template-columns: 380px 2px 1fr;
            gap: 30px; max-width: 1300px; margin: auto;
            position: relative; z-index: 2;
        }

        .divisor { background: rgba(255,255,255,0.4); }

        /* FORMULARIO */
        .formulario-wrapper { position: relative; }
        .formulario {
            background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; border: 1px solid rgba(245,230,163,0.2);
        }
        .formulario input, .formulario select {
            width: 100%; padding: 10px; margin-bottom: 20px;
            border-radius: 6px; border: none; background: #FFF5CC; color: black; box-sizing: border-box;
        }

        .overlay-bloqueo {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(10,10,10,0.98); border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        /* CALENDARIO */
        #calendar {
            background: white; padding: 20px; border-radius: 18px; color: black;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* BOTONES */
        .btn-mpss {
            background: #7A1E2C; color: #F5E6A3; border: 1px solid #F2C94C;
            padding: 10px 20px; border-radius: 10px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }
        .btn-mpss:hover { transform: scale(1.05); background: #912233; box-shadow: 0 0 15px #FFD700; }

        .btn-enviar {
            background: #F2C94C; color: #300; border: none; width: 100%;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* MODALES */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 10000; justify-content: center; align-items: center;
        }
        .modal-contenido { background: white; color: black; padding: 30px; border-radius: 20px; width: 500px; text-align: center; }
        
        .scroll-admin { max-height: 250px; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; padding: 10px; }

        /* TLACUACHE */
        .tlacuache-admin {
            position: fixed; bottom: 35px; right: 20px; width: 180px;
            z-index: 9998; pointer-events: none; animation: balanceo 2.5s infinite ease-in-out;
        }
        @keyframes balanceo { 0%, 100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
    </style>
</head>
<body>

    <header class="encabezado">
        <h1 class="titulo-cinzel">BIENVENIDOS</h1>
        <div class="subtitulo">INSCRIPCIÓN A TEMAS</div>
    </header>

    <div class="contenedor">
        <div class="formulario-wrapper">
            <div id="bloqueo" class="overlay-bloqueo">
                <h2 style="color: #F5E6A3;">Acceso Restringido</h2>
                <input type="password" id="inputPass" placeholder="Código de Acceso">
                <button class="btn-mpss" id="btnUnlock">DESBLOQUEAR</button>
            </div>

            <div class="formulario">
                <h2>Registro</h2>
                <form id="formInscripcion">
                    <input type="text" id="nombreAlumno" placeholder="Tu Nombre" required>
                    <input type="email" id="correoAlumno" placeholder="Tu Correo" required>
                    <label style="font-size: 12px;">Selecciona Tema:</label>
                    <select id="selectTemas"></select>
                    <button type="submit" class="btn-enviar">ENVIAR INSCRIPCIÓN</button>
                </form>
            </div>
        </div>

        <div class="divisor"></div>
        <div id="calendar"></div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="modal-contenido">
            <h2>Panel Administrador</h2>
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
                <button class="btn-mpss" onclick="tab('actividades')">Actividades</button>
                <button class="btn-mpss" onclick="tab('inscritos')">Inscritos</button>
            </div>

            <div id="tabActividades">
                <div class="scroll-admin" id="listaAdminActividades"></div>
                <h3>Nueva Actividad</h3>
                <input type="text" id="newTitle" placeholder="Título" style="width:100%; margin:5px 0;">
                <input type="date" id="newDate" style="width:100%; margin:5px 0;">
                <button class="btn-mpss" id="btnSaveActividad" style="background: green; width:100%;">Guardar</button>
            </div>

            <div id="tabInscritos" style="display:none;">
                <div class="scroll-admin" id="listaAdminInscritos"></div>
            </div>

            <button class="btn-mpss" onclick="cerrarAdmin()" style="background: #333; width: 100%; margin-top: 15px;">Salir</button>
        </div>
    </div>

    <div id="adminLogin" class="modal">
        <div class="modal-contenido" style="width: 300px;">
            <h3>Acceso Admin</h3>
            <input type="password" id="passAdmin" style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <button class="btn-mpss" id="btnVerifyAdmin" style="width: 100%;">Entrar</button>
        </div>
    </div>

    <img src="https://i.ibb.co/FZtb0Vk/tlaq-png.png" class="tlacuache-admin">
    <button class="btn-mpss" id="btnOpenLogin" style="position: fixed; bottom: 20px; right: 20px; z-index: 10001;">ADMIN</button>

    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBnqZEuuv0V_CAmR_gBqPCQ3bgyS1ny_RI",
            authDomain: "calendario-mpss.firebaseapp.com",
            projectId: "calendario-mpss",
            storageBucket: "calendario-mpss.firebasestorage.app",
            messagingSenderId: "809122907226",
            appId: "1:809122907226:web:c66cfc12aa8617de1fc463"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let calendar;

        emailjs.init("JbLq6Pz4o5CfG8tfQ");

        // --- INICIALIZAR ---
        document.addEventListener('DOMContentLoaded', async () => {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                buttonText: { today: 'Hoy' },
                events: async (info, success) => {
                    const snapEvs = await getDocs(collection(db, "eventos"));
                    const snapIns = await getDocs(collection(db, "inscripciones"));
                    
                    let inscritosMap = {};
                    snapIns.forEach(d => { inscritosMap[d.data().cursoId] = d.data().alumno; });

                    const select = document.getElementById('selectTemas');
                    select.innerHTML = "";
                    
                    const list = [];
                    snapEvs.forEach(d => {
                        const data = d.data();
                        let titulo = data.title;
                        let color = "#D4AF37";

                        if(inscritosMap[d.id]) {
                            titulo += " | Inscrito: " + inscritosMap[d.id];
                            color = "#B22222";
                        } else {
                            let opt = document.createElement('option');
                            opt.value = d.id; opt.textContent = data.title;
                            select.appendChild(opt);
                        }

                        list.push({ id: d.id, title: titulo, start: data.start, backgroundColor: color });
                    });
                    success(list);
                }
            });
            calendar.render();

            if(sessionStorage.getItem('mpss_unlocked') === 'true') document.getElementById('bloqueo').style.display = 'none';
        });

        // --- LÓGICA DE INSCRIPCIÓN (NUBE) ---
        document.getElementById('formInscripcion').onsubmit = async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombreAlumno').value;
            const correo = document.getElementById('correoAlumno').value;
            const cursoId = document.getElementById('selectTemas').value;
            const cursoNom = document.getElementById('selectTemas').selectedOptions[0].text;

            await addDoc(collection(db, "inscripciones"), { 
                alumno: nombre, correo: correo, cursoId: cursoId, cursoNombre: cursoNom 
            });

            emailjs.send("service_u8bx9dj","template_0yx01mn", { nombre, correo, curso: cursoNom });
            
            alert("¡Inscripción exitosa!");
            location.reload();
        };

        // --- LÓGICA DE ACCESO (HASH) ---
        document.getElementById('btnUnlock').onclick = async () => {
            const p = document.getElementById('inputPass').value;
            const msgBuffer = new TextEncoder().encode(p);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            
            if(hashHex === "5d2d86f0f75a5c8c4a0cfe5fa5e1e0b1c0b4f7e5d70bdb8c4b4e33e3c0df0b91") {
                sessionStorage.setItem('mpss_unlocked', 'true');
                document.getElementById('bloqueo').style.display = 'none';
            } else { alert("Código incorrecto"); }
        };

        // --- GESTIÓN ADMIN ---
        window.tab = (t) => {
            document.getElementById('tabActividades').style.display = t === 'actividades' ? 'block' : 'none';
            document.getElementById('tabInscritos').style.display = t === 'inscritos' ? 'block' : 'none';
            if(t === 'inscritos') cargarInscritos();
        };

        document.getElementById('btnOpenLogin').onclick = () => document.getElementById('adminLogin').style.display='flex';
        
        document.getElementById('btnVerifyAdmin').onclick = () => {
            if(document.getElementById('passAdmin').value === "MPSS2026") {
                document.getElementById('adminLogin').style.display='none';
                document.getElementById('adminPanel').style.display='flex';
                cargarActividadesAdmin();
            } else { alert("Error"); }
        };

        async function cargarActividadesAdmin() {
            const snap = await getDocs(collection(db, "eventos"));
            const lista = document.getElementById('listaAdminActividades');
            lista.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div');
                item.style = "display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; color:black;";
                item.innerHTML = `<span>${d.data().title}</span>`;
                const btn = document.createElement('button');
                btn.textContent = "Eliminar"; btn.style = "color:red; border:none; cursor:pointer; background:none;";
                btn.onclick = async () => { if(confirm("¿Borrar?")){ await deleteDoc(doc(db, "eventos", d.id)); location.reload(); } };
                item.appendChild(btn);
                lista.appendChild(item);
            });
        }

        async function cargarInscritos() {
            const snap = await getDocs(collection(db, "inscripciones"));
            const lista = document.getElementById('listaAdminInscritos');
            lista.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div');
                item.style = "padding:8px; border-bottom:1px solid #eee; color:black; text-align:left;";
                item.innerHTML = `<b>${d.data().cursoNombre}</b>: ${d.data().alumno} <br> <small>${d.data().correo}</small>`;
                const btn = document.createElement('button');
                btn.textContent = "[Eliminar Participante]"; btn.style = "color:red; border:none; cursor:pointer; background:none; font-size:10px;";
                btn.onclick = async () => { if(confirm("¿Borrar inscripción?")){ await deleteDoc(doc(db, "inscripciones", d.id)); location.reload(); } };
                item.appendChild(btn);
                lista.appendChild(item);
            });
        }

        document.getElementById('btnSaveActividad').onclick = async () => {
            const title = document.getElementById('newTitle').value;
            const start = document.getElementById('newDate').value;
            if(!title || !start) return;
            await addDoc(collection(db, "eventos"), { title, start });
            location.reload();
        };

        window.cerrarAdmin = () => document.getElementById('adminPanel').style.display='none';
    </script>
</body>
</html>
