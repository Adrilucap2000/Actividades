<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario MPSS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <style>
        /* --- ESTILOS VISUALES (BASADOS EN TU IMAGEN) --- */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, rgba(90,10,20,0.92), rgba(90,10,20,0.85)),
            url("https://i.imgur.com/hTT1t8L.jpeg");
            background-size: cover;
            background-attachment: fixed;
            margin: 0; padding: 20px; color: white;
            overflow-x: hidden;
        }

        .encabezado { text-align: center; margin-bottom: 40px; }
        
        .titulo-cinzel {
            font-family: 'Cinzel Decorative';
            font-size: 65px; color: #F5E6A3; margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .subtitulo {
            font-family: 'Cinzel Decorative';
            font-size: 18px; letter-spacing: 4px; color: white;
            margin-top: 5px;
        }

        /* CONTENEDOR PRINCIPAL */
        .contenedor {
            display: grid;
            grid-template-columns: 380px 2px 1fr;
            gap: 30px; max-width: 1300px; margin: auto;
        }

        .divisor-vertical { width: 2px; background: rgba(255,255,255,0.3); align-self: stretch; }

        /* FORMULARIO Y BLOQUEO */
        .formulario-wrapper { position: relative; }
        .formulario {
            background: rgba(0,0,0,0.5);
            padding: 30px; border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .formulario input, .formulario select {
            width: 100%; padding: 10px; margin: 10px 0;
            border-radius: 5px; border: none; background: #333; color: white;
        }

        .overlay-formulario {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.9); border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        /* CALENDARIO */
        #calendar {
            background: white; border-radius: 15px; padding: 20px; color: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* BOTONES (VINO CON DORADO) */
        .btn-vino {
            background: #7A1E2C; color: #F5E6A3; border: 1px solid #F2C94C;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }
        .btn-vino:hover { transform: scale(1.05); background: #912233; }

        .tlacuache-admin {
            position: fixed; bottom: 70px; right: 20px; width: 80px;
            z-index: 99; animation: balanceo 3s infinite ease-in-out;
        }
        @keyframes balanceo { 0%, 100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }
        
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-contenido { background: white; color: black; padding: 30px; border-radius: 15px; width: 500px; text-align: center; }
    </style>
</head>
<body>

    <header class="encabezado">
        <h1 class="titulo-cinzel">BIENVENIDOS</h1>
        <div class="subtitulo">INSCRIPCIÓN A TEMAS</div>
    </header>

    <div class="contenedor">
        <div class="formulario-wrapper">
            <div id="overlay-formulario" class="overlay-formulario">
                <h2 style="font-size: 28px;">Acceso restringido</h2>
                <p>Para enviar la inscripción necesitas un código.</p>
                <input type="password" id="passCode" placeholder="Código de acceso" style="background: white; color: black; width: 80%;">
                <button class="btn-vino" id="btnDesbloquear">DESBLOQUEAR</button>
            </div>

            <div class="formulario">
                <h3>Formulario de selección</h3>
                <p style="font-size: 14px; color: #ccc;">Selecciona el tema de tu preferencia.</p>
                <input type="text" placeholder="Nombre">
                <input type="email" placeholder="Correo">
                <select id="selectTemas"><option>Cargando temas...</option></select>
                <button style="width: 100%; background: #222; color: #555; border: none; padding: 12px; cursor: not-allowed;">ENVIAR INSCRIPCIÓN</button>
            </div>
        </div>

        <div class="divisor-vertical"></div>
        <div id="calendar"></div>
    </div>

    <div id="modalAdmin" class="modal">
        <div class="modal-contenido">
            <h2>Gestión de Actividades</h2>
            <div id="listaAdmin" style="max-height: 200px; overflow-y: auto; text-align: left; margin-bottom: 20px; border-bottom: 1px solid #eee;"></div>
            <input type="text" id="newTitle" placeholder="Título" style="width:90%; padding:8px; margin:5px;">
            <input type="date" id="newDate" style="width:90%; padding:8px; margin:5px;">
            <button class="btn-vino" id="btnGuardar" style="background: green; width: 100%; border: none;">Guardar</button>
            <button class="btn-vino" onclick="cerrar()" style="background: #333; width: 100%; border: none; margin-top: 10px;">Salir</button>
        </div>
    </div>

    <div id="loginAdmin" class="modal">
        <div class="modal-contenido" style="width: 300px;">
            <h3>Admin Login</h3>
            <input type="password" id="adminPass" style="width: 100%; padding: 8px; margin-bottom: 15px;">
            <button class="btn-vino" id="btnEntrar">Entrar</button>
        </div>
    </div>

    <img src="https://raw.githubusercontent.com/TU_USUARIO/TU_REPOSITORIO/main/tlaquache-admin.png" 
         class="tlacuache-admin" onerror="this.src='https://i.imgur.com/37zYcO6.png'">
    <button class="btn-vino" id="btnAbrirLogin" style="position: fixed; bottom: 20px; right: 20px;">ADMIN</button>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnqZEuuv0V_CAmR_gBqPCQ3bgyS1ny_RI",
            authDomain: "calendario-mpss.firebaseapp.com",
            projectId: "calendario-mpss",
            storageBucket: "calendario-mpss.firebasestorage.app",
            messagingSenderId: "809122907226",
            appId: "1:809122907226:web:c66cfc12aa8617de1fc463"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let calendar;

        // INICIALIZACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                buttonText: { today: 'Hoy' },
                events: async (info, success) => {
                    const snap = await getDocs(collection(db, "eventos"));
                    const events = [];
                    const select = document.getElementById('selectTemas');
                    select.innerHTML = "";
                    snap.forEach(d => {
                        events.push({ id: d.id, ...d.data() });
                        let opt = document.createElement('option');
                        opt.value = d.id; opt.textContent = d.data().title;
                        select.appendChild(opt);
                    });
                    success(events);
                }
            });
            calendar.render();
            if(sessionStorage.getItem('unlocked') === 'true') document.getElementById('overlay-formulario').style.display='none';
        });

        // BOTONES
        document.getElementById('btnDesbloquear').onclick = async () => {
            const pass = document.getElementById('passCode').value;
            const msgBuffer = new TextEncoder().encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            if(hashHex === "5d2d86f0f75a5c8c4a0cfe5fa5e1e0b1c0b4f7e5d70bdb8c4b4e33e3c0df0b91") {
                sessionStorage.setItem('unlocked', 'true');
                document.getElementById('overlay-formulario').style.display = 'none';
            } else { alert("Código incorrecto"); }
        };

        document.getElementById('btnAbrirLogin').onclick = () => document.getElementById('loginAdmin').style.display='flex';
        
        document.getElementById('btnEntrar').onclick = () => {
            if(document.getElementById('adminPass').value === "MPSS2026") {
                document.getElementById('loginAdmin').style.display='none';
                document.getElementById('modalAdmin').style.display='flex';
                cargarAdmin();
            } else { alert("Error"); }
        };

        async function cargarAdmin() {
            const snap = await getDocs(collection(db, "eventos"));
            const lista = document.getElementById('listaAdmin');
            lista.innerHTML = "";
            snap.forEach(d => {
                lista.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; color: black;">
                    <span>${d.data().title}</span>
                    <button onclick="borrar('${d.id}')" style="color:red; border:none; background:none; cursor:pointer;">Eliminar</button>
                </div>`;
            });
        }

        window.borrar = async (id) => {
            await deleteDoc(doc(db, "eventos", id));
            calendar.refetchEvents();
            cargarAdmin();
        };

        document.getElementById('btnGuardar').onclick = async () => {
            const title = document.getElementById('newTitle').value;
            const start = document.getElementById('newDate').value;
            if(!title || !start) return;
            await addDoc(collection(db, "eventos"), { title, start });
            calendar.refetchEvents();
            cargarAdmin();
        };

        window.cerrar = () => document.querySelectorAll('.modal').forEach(m => m.style.display='none');
    </script>
</body>
</html>
